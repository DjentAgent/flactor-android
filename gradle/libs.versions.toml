[versions]
agp = "8.11.1"
activityCompose = "1.8.0"
coil = "2.4.0"
composeBom = "2024.09.00"
coreKtx = "1.10.1"
datastore = "1.1.7"
desugar = "2.0.3"
documentfile = "1.0.1"
espressoCore = "3.5.1"
googleMaterial = "1.12.0"
hilt = "2.57"
androidxHilt = "1.2.0"
hiltNavCompose = "1.2.0"
jlibtorrent = "2.0.12.0"
junit4 = "4.13.2"
kspPlugin = "2.1.10-1.0.29"
ktlintPlugin = "12.1.2"
kotlin = "2.1.10"
kotlinxCoroutines = "1.8.1"
kotlinxSerializationJson = "1.5.1"
lifecycle = "2.8.3"
okhttp = "4.11.0"
